<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bodas de Ouro – Geraldo & Isabel</title>
<style>
  body {
    margin: 0;
    background: #000;
    overflow: hidden;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="convite"></canvas>

<script>
const canvas = document.getElementById("convite");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Fundo com estrelas cintilando
function drawStars() {
  for (let i = 0; i < 100; i++) {
    ctx.fillStyle = "rgba(212,175,55," + Math.random() + ")";
    ctx.beginPath();
    ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Texto animado
function drawText() {
  ctx.fillStyle = "#d4af37";
  ctx.font = "bold 32px Playfair Display, serif";
  ctx.textAlign = "center";
  ctx.fillText("Convite Especial", canvas.width/2, 100);
  ctx.fillText("Bodas de Ouro", canvas.width/2, 150);
  ctx.fillText("Geraldo & Isabel", canvas.width/2, 200);
  ctx.font = "20px Arial";
  ctx.fillText("📅 17 de Janeiro às 11h00", canvas.width/2, 260);
  ctx.fillText("📍 Clube Aquáticos do Bosque", canvas.width/2, 300);
}

// Botão de links
function drawButton(text, y, url) {
  ctx.fillStyle = "#d4af37";
  ctx.fillRect(canvas.width/2 - 100, y - 30, 200, 50);
  ctx.fillStyle = "#000";
  ctx.font = "bold 18px Arial";
  ctx.fillText(text, canvas.width/2, y);
  
  // Detecta clique
  canvas.addEventListener("click", function(e) {
    const x = e.offsetX;
    const clickY = e.offsetY;
    if (x > canvas.width/2 - 100 && x < canvas.width/2 + 100 && clickY > y - 30 && clickY < y + 20) {
      window.open(url, "_blank");
    }
  });
}

// Loop de animação
function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawStars();
  drawText();
  drawButton("Abrir no Maps", 360, "https://www.google.com/maps?q=Avenida+Bosque+da+Saúde,+654");
  drawButton("Confirme sua Presença", 430, "https://forms.gle/seulinkdeconfirmacao");
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>

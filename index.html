<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bodas de Ouro - Geraldo & Isabel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: 'Cinzel Decorative', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 95%;
      padding: 20px;
      text-align: center;
      border: 20px solid transparent;
      border-image: url('moldura-dourada-refinada.png') 60 round; /* imagem da moldura */
      background: radial-gradient(circle at center, rgba(30,30,30,0.6) 0%, transparent 70%);
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 3rem;
      margin: 10px 0;
      background: linear-gradient(to bottom, #d4af37, #f7ef8a, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      font-size: 1.5rem;
      color: #FFD700;
      margin-bottom: 20px;
    }

    .info {
      font-size: 1.2rem;
      margin: 15px 0;
    }

    a.confirm {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 25px;
      border: 2px solid #FFD700;
      border-radius: 25px;
      color: #FFD700;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    a.confirm:hover {
      background: #FFD700;
      color: #000;
    }

    @media (max-width: 480px) {
      h1 { font-size: 2.2rem; }
      h2 { font-size: 1.2rem; }
      .info { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Geraldo & Isabel</h1>
    <h2>Celebrando 50 anos de união</h2>

    <div class="info">
      📅 4 de Julho de 2026 às 18:00h <br>
      📍 Clube Aquático do Bosque <br>
      Rua Traituba, 287 — Vila da Saúde
    </div>

    <a href="https://seulinkdeconfirmacao.com" target="_blank" class="confirm">
      CONFIRMAR PRESENÇA
    </a>

    <div class="info" style="margin-top:30px;">
      Esperamos por você! <br>
      <strong>50 ANOS</strong>
    </div>
  </div>
</body>
</html>

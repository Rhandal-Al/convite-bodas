<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bodas de Ouro – Geraldo & Isabel</title>
<style>
  body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background-color: #000;
    color: #d4af37;
    overflow: hidden;
  }
  /* Fundo animado */
  .stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(212,175,55,0.2) 0%, transparent 70%);
    animation: sparkle 3s infinite alternate;
    z-index: -1;
  }
  @keyframes sparkle {
    from {opacity: 0.6;}
    to {opacity: 1;}
  }
  /* Tela inicial */
  .cover {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    cursor: pointer;
  }
  .cover h1, .cover h2, .cover h3 {
    margin: 10px;
    animation: fadeIn 2s ease-in-out;
  }
  /* Página principal */
  .main {
    display: none;
    text-align: center;
    padding: 40px;
  }
  .names {
    font-size: 2.5em;
    animation: slideIn 3s ease-in-out;
  }
  @keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
  }
  @keyframes slideIn {
    from {opacity: 0; transform: translateY(-30px);}
    to {opacity: 1; transform: translateY(0);}
  }
  .buttons a {
    display: inline-block;
    margin: 10px;
    padding: 12px 20px;
    background-color: #d4af37;
    color: #000;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
  }
</style>
<script>
  function openInvite() {
    document.querySelector('.cover').style.display = 'none';
    document.querySelector('.main').style.display = 'block';
  }
</script>
</head>
<body>
<div class="stars"></div>

<!-- Tela inicial -->
<div class="cover" onclick="openInvite()">
  <h1>Convite Especial</h1>
  <h2>Bodas de Ouro</h2>
  <h3>Geraldo & Isabel</h3>
  <p>(Clique para abrir)</p>
</div>

<!-- Página principal -->
<div class="main">
  <div class="names">Geraldo & Isabel</div>
  <p>Celebrando 50 anos de união</p>
  <p>📅 17 de Janeiro às 11h00</p>
  <p>📍 Clube Aquáticos do Bosque<br>
     <a href="https://www.google.com/maps?q=Avenida+Bosque+da+Saúde,+654" target="_blank">Abrir no Maps</a></p>
  <div class="buttons">
    <a href="#">Confirme sua Presença</a>
  </div>
  <h3>Esperamos por você!</h3>
  <h2>50 ANOS</h2>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bodas de Ouro - Geraldo & Isabel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    .content-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      margin: auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .gold-glow {
      background: linear-gradient(to bottom, #cfaf3c 0%, #f7ef8a 50%, #cfaf3c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: bold;
    }

    .names-display {
      font-family: 'Great Vibes', cursive;
      font-size: 2.5rem;
      min-height: 3rem;
      margin: 15px 0;
      line-height: 1.2;
    }

    .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(15px);
      animation: letterIn 0.5s ease forwards;
    }

    @keyframes letterIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .photo-box {
      width: 80vw;
      max-width: 240px;
      height: auto;
      margin: 20px 0;
      opacity: 0;
      transform: scale(0.8);
      animation: reveal 1.2s ease forwards;
      animation-delay: 0.5s;
    }

    .photo-border {
      width: 100%; padding: 6px;
      border-radius: 50% 50% 10px 10px;
      border: 2px solid #d4af37;
      background: linear-gradient(135deg, #222, #000);
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
    }

    .photo-inner img {
      width: 100%; height: auto;
      border-radius: 50% 50% 5px 5px;
      object-fit: cover;
    }

    @keyframes reveal {
      to { opacity: 1; transform: scale(1); }
    }

    .info-card {
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 2.5s;
      font-size: 0.9rem;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .map-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 20px;
      border: 1px solid #d4af37;
      border-radius: 20px;
      color: #d4af37;
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 1px;
    }

    .map-btn:hover {
      background: #d4af37;
      color: #000;
    }

    .divider {
      width: 50px;
      height: 1px;
      background: #d4af37;
      margin: 15px auto;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="content-container">
    <div class="info-card" style="animation-delay:0.2s;">
      <p style="letter-spacing:4px; font-size:0.6rem;">1974 — 2024</p>
      <h1 class="gold-glow" style="font-family:'Cinzel',serif; font-size:1.5rem; letter-spacing:5px;">BODAS DE OURO</h1>
    </div>

    <div class="photo-box">
      <div class="photo-border">
        <div class="photo-inner">
          <img src="foto-casal.jpeg.png" alt="Geraldo e Isabel">
        </div>
      </div>
    </div>

    <div class="names-display gold-glow" id="names-box"></div>

    <div class="divider"></div>

    <div class="info-card">
      <div style="font-family:'Cinzel',serif; font-size:1.2rem; color:#d4af37; letter-spacing:3px;">30 NOVEMBRO</div>
      <p style="font-size:0.8rem; margin-top:5px;">Sábado às 19:30h</p>

      <div style="margin-top:20px; line-height:1.6;">
        <p style="font-weight:bold;">Igreja Santo Antônio — Saudade</p>
        <p style="color:#ccc;">Recepção:</p>
        <p class="text-white">Clube Aquático do Bosque</p>

        <a href="https://www.google.com/maps/search/?api=1&query=Rua+Traituba+287+Vila+da+Saude" target="_blank" class="map-btn">
          VER LOCAL NO MAPA
        </a>

        <p style="font-size:0.7rem; color:#aaa; margin-top:10px;">Rua Traituba, 287 — Vila da Saúde</p>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class GoldDust {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 1.5;
        this.speedY = Math.random() * -0.5 - 0.2;
        this.opacity = Math.random();
      }
      draw() {
        ctx.fillStyle = `rgba(212,175,55,${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fill();
      }
      update() {
        this.y += this.speedY;
        if(this.y < -10) this.y = canvas.height + 10;
      }
    }

    function initParticles() {
      particles = [];
      for(let i=0; i<60; i++) particles.push(new GoldDust());
    }

    function loop() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }

    function animateNames() {
      const box = document.getElementById('names-box');
      const text = "Geraldo & Isabel";
      setTimeout(() => {
        text.split('').forEach((l,i) => {
          const s = document.createElement('span');
          s.textContent = l === ' ' ? '\u00A0' : l;
          s.className = 'letter';
          s.style.animationDelay = `${i*0.1}s`;
          box.appendChild(s);
        });
      }, 1200);
    }

    window.onload = () => {
      resize();
      initParticles();
      loop();
      animateNames();
    };
    window.onresize = resize;
  </script>
</body>
</html>

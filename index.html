<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bodas de Ouro - Geraldo & Isabel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: 'Cinzel Decorative', serif;
    }

    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    .container {
        max-width: 95%;
        margin: auto;
        text-align: center;
        position: relative;
        z-index: 10;
        background: rgba(0,0,0,0.6);
        padding: 20px;
        border: 20px solid transparent;
        border-image: url('moldura-convite.png') 60 round;
    }

    .foto-container {
        display: inline-block;
        margin-bottom: 20px;
        border: 15px solid transparent;
        border-image: url('moldura-foto.png') 60 round;
        padding: 5px; /* espaço entre a foto e a moldura */
    }

    .foto-casal {
        width: 250px;   /* ajuste conforme necessário */
        height: auto;
        display: block;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 2.5rem;
      margin: 10px 0;
      background: linear-gradient(to bottom, #d4af37, #f7ef8a, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: #FFD700; /* fallback */
    }

    h2 {
      font-size: 1.5rem;
      color: #FFD700;
      margin-bottom: 20px;
    }

    .info a {
      border: 2px solid #FFD700;
      padding: 8px 20px;
      border-radius: 20px;
      color: #FFD700;
      font-weight: bold;
      transition: 0.3s;
      text-decoration: none;
    }
    .info a:hover {
      background: #FFD700;
      color: #000;
    }

    a.confirm {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 25px;
      border: 2px solid #FFD700;
      border-radius: 25px;
      color: #FFD700;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    a.confirm:hover {
      background: #FFD700;
      color: #000;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.8rem; }
      h2 { font-size: 1.2rem; }
      .info { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <!-- Canvas para fundo animado -->
  <canvas id="bg-canvas"></canvas>

  <div class="container">
     <div class="foto-container">
      <img src="foto-casal1.2.png" alt="Foto do casal" class="foto-casal">
    </div>

    <h1>Geraldo & Isabel</h1>
    <h2>Bodas de Ouro</h2> <!-- texto adicionado -->
    <h2>Celebrando 50 anos de união</h2>

    <div class="info">
      📅 4 de Julho de 2026 às 18:00h <br>
      <a href="https://www.google.com/maps/search/?api=1&query=Clube+Aquatico+do+Bosque+Rua+Traituba+287+Vila+da+Saude" target="_blank">
        Recepção: Clube Aquático do Bosque
      </a>
    </div>

    <a href="https://seulinkdeconfirmacao.com" target="_blank" class="confirm">
      CONFIRMAR PRESENÇA
    </a>

    <div class="info" style="margin-top:30px;">
      Esperamos por você! <br>
      <strong>50 ANOS</strong>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    class GoldDust {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 1.5;
        this.speedY = Math.random() * -0.5 - 0.2;
        this.opacity = Math.random();
      }
      draw() {
        ctx.fillStyle = `rgba(212,175,55,${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fill();
      }
      update() {
        this.y += this.speedY;
        if(this.y < -10) this.y = canvas.height + 10;
      }
    }

    function initParticles() {
      particles = [];
      for(let i=0; i<80; i++) particles.push(new GoldDust());
    }

    function loop() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }

    window.onload = () => {
      resize();
      initParticles();
      loop();
    };
    window.onresize = resize;
  </script>
</body>
</html>
